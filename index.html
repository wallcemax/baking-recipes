<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🍰 烘焙食譜共享系統</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#A8324A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="烘焙食譜">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --cream: #FBF3E7;
            --paper: #FFFDF9;
            --espresso: #3A2A1E;
            --espresso-soft: #6B5847;
            --jam: #A8324A;
            --jam-dark: #862A3D;
            --honey: #C98A2C;
            --sage: #6F8C6E;
            --line: #E8DCC8;
        }
        * { -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--cream);
            color: var(--espresso);
            font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
        }
        .font-display { font-family: 'Noto Serif TC', serif; }
        *:focus-visible { outline: 2px solid var(--jam); outline-offset: 2px; border-radius: 4px; }

        /* recipe card with pie-crust scalloped bottom edge */
        .recipe-card {
            position: relative;
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 1.5rem 1.5rem 0 0;
            padding-bottom: 1.5rem;
            transition: transform .25s ease, box-shadow .25s ease;
            cursor: pointer;
        }
        .recipe-card:hover, .recipe-card:focus-visible {
            transform: translateY(-4px);
            box-shadow: 0 16px 28px -12px rgba(58,42,30,0.25);
        }
        .recipe-card::after {
            content: "";
            position: absolute; left: 0; right: 0; bottom: -1px; height: 16px;
            background: var(--paper);
            -webkit-mask-image: radial-gradient(circle at 10px 8px, transparent 9px, #000 9.5px);
            mask-image: radial-gradient(circle at 10px 8px, transparent 9px, #000 9.5px);
            -webkit-mask-size: 20px 16px; mask-size: 20px 16px;
            -webkit-mask-repeat: repeat-x; mask-repeat: repeat-x;
        }

        .form-input {
            width: 100%; padding: 0.9rem 1.15rem;
            border: 1px solid var(--line); border-radius: 1rem;
            background: var(--paper); font-size: 1rem; color: var(--espresso);
            transition: border-color .2s, box-shadow .2s;
        }
        .form-input::placeholder { color: #B3A492; }
        .form-input:focus { outline: none; border-color: var(--jam); box-shadow: 0 0 0 3px rgba(168,50,74,0.14); }

        .btn-primary {
            background: var(--jam); color: #fff; border-radius: 999px;
            padding: 0.95rem 1.75rem; font-weight: 600; transition: background .2s, transform .1s;
        }
        .btn-primary:hover { background: var(--jam-dark); }
        .btn-primary:active { transform: scale(.97); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
        .btn-secondary {
            background: var(--cream); color: var(--espresso); border: 1px solid var(--line);
            border-radius: 999px; padding: 0.95rem 1.75rem; font-weight: 600; transition: background .2s;
        }
        .btn-secondary:hover { background: #F1E7D6; }
        .btn-danger { background: #C4453F; color: #fff; border-radius: 999px; padding: 0.95rem 1.75rem; font-weight: 600; transition: background .2s; }
        .btn-danger:hover { background: #A6362F; }
        .btn-amber { background: var(--honey); color: #fff; border-radius: 999px; padding: 0.95rem 1.75rem; font-weight: 600; transition: background .2s; }
        .btn-amber:hover { background: #AC7420; }

        .chip {
            padding: 0.55rem 1.1rem; border-radius: 999px; border: 1px solid var(--line);
            background: var(--paper); color: var(--espresso-soft); font-size: 0.875rem;
            white-space: nowrap; transition: all .2s; flex-shrink: 0;
        }
        .chip.active { background: var(--jam); color: #fff; border-color: var(--jam); }
        .chip-row { display: flex; gap: 0.5rem; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 2px; }
        .chip-row::-webkit-scrollbar { display: none; }

        .modal-backdrop { background: rgba(58,42,30,0.55); }
        .sheet-panel { animation: sheetUp .35s cubic-bezier(.22,1,.36,1); }
        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @media (min-width: 768px) {
            @keyframes sheetUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        }
        @media (prefers-reduced-motion: reduce) {
            .sheet-panel { animation: none; }
            .recipe-card { transition: none; }
        }

        .icon-btn {
            width: 2.75rem; height: 2.75rem; border-radius: 1rem;
            display: flex; align-items: center; justify-content: center;
            background: var(--paper); border: 1px solid var(--line); position: relative; flex-shrink: 0;
        }
        .cart-badge {
            position: absolute; top: -6px; right: -6px; min-width: 18px; height: 18px; padding: 0 4px;
            border-radius: 999px; background: var(--jam); color: #fff; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }
        .fav-btn {
            width: 2.25rem; height: 2.25rem; border-radius: 999px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.92);
        }
        .shopping-item.checked-off { opacity: .4; text-decoration: line-through; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 pb-28 md:pb-10">
        <header class="sticky top-0 z-30 -mx-4 sm:-mx-6 px-4 sm:px-6 py-3 mb-6 bg-[var(--cream)]/90 backdrop-blur border-b" style="border-color:var(--line)">
            <div class="flex justify-between items-center gap-3">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="w-11 h-11 sm:w-12 sm:h-12 rounded-2xl flex items-center justify-center text-2xl sm:text-3xl shrink-0" style="background:var(--jam)">🍰</div>
                    <div class="min-w-0">
                        <h1 class="font-display text-xl sm:text-3xl font-bold leading-tight truncate">烘焙食譜</h1>
                        <p class="text-xs sm:text-sm hidden sm:block" style="color:var(--jam)">共享食譜系統</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="openShoppingList()" class="icon-btn" aria-label="購物清單">
                        <i class="fas fa-cart-shopping" style="color:var(--jam)"></i>
                        <span id="cart-badge" class="cart-badge hidden">0</span>
                    </button>
                    <div id="user-info" class="flex items-center gap-3 shrink-0"></div>
                </div>
            </div>
        </header>

        <div class="flex flex-col gap-3 mb-6">
            <div class="flex gap-3">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2" style="color:#B3A492"></i>
                    <input id="search-input" onkeyup="filterRecipes()" placeholder="搜尋食譜名稱..." class="form-input pl-12">
                </div>
                <button onclick="showAddModal()" class="btn-primary hidden md:flex items-center gap-2 whitespace-nowrap">
                    <i class="fas fa-plus"></i> 新增食譜
                </button>
            </div>
            <div id="extra-filter-chips" class="chip-row">
                <button id="chip-fav" class="chip" onclick="toggleFavoritesOnly()">❤️ 我的最愛</button>
                <button id="chip-mine" class="chip" onclick="toggleMyRecipesOnly()">🙋 我的食譜</button>
            </div>
            <div id="category-chips" class="chip-row"></div>
        </div>

        <div id="recipes-grid" class="grid gap-5" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));"></div>
    </div>

    <!-- 手機版新增按鈕 (FAB) -->
    <button onclick="showAddModal()" class="md:hidden fixed bottom-6 right-6 w-14 h-14 rounded-full flex items-center justify-center text-2xl z-40 btn-primary" style="padding:0" aria-label="新增食譜">
        <i class="fas fa-plus"></i>
    </button>

    <!-- 食譜詳細 Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 modal-backdrop flex items-end md:items-center justify-center z-50">
        <div class="bg-white w-full md:max-w-2xl max-h-[92vh] md:max-h-[88vh] rounded-t-[2rem] md:rounded-[2rem] overflow-y-auto sheet-panel" id="modal-content"></div>
    </div>

    <!-- 新增/編輯 Modal -->
    <div id="add-modal" class="hidden fixed inset-0 modal-backdrop flex items-end md:items-center justify-center z-50">
        <div class="bg-white w-full md:max-w-2xl max-h-[92vh] rounded-t-[2rem] md:rounded-[2rem] overflow-hidden flex flex-col sheet-panel">
            <div class="flex items-center justify-between px-6 sm:px-8 py-5 border-b shrink-0" style="border-color:var(--line)">
                <h2 class="font-display text-xl sm:text-2xl font-bold" id="modal-title">新增食譜</h2>
                <button onclick="closeAddModal()" class="text-3xl leading-none" style="color:#B3A492" aria-label="關閉">×</button>
            </div>
            <div class="flex-1 overflow-y-auto px-6 sm:px-8 py-6">
                <input id="recipe-id" type="hidden">
                <input id="name" class="form-input mb-4 text-lg" placeholder="食譜名稱">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <select id="category" class="form-input">
                        <option value="蛋糕">🎂 蛋糕</option><option value="麵包">🍞 麵包</option><option value="餅乾">🍪 餅乾</option>
                        <option value="塔派">🥧 塔派</option><option value="慕斯">🍮 慕斯</option><option value="其他">🍽️ 其他</option>
                    </select>
                    <input id="servings" type="number" value="8" class="form-input">
                </div>
                <div class="mb-6">
                    <label class="font-semibold block mb-3">📷 食譜封面照片（選填）</label>
                    <div class="flex items-center gap-4">
                        <div id="image-preview-wrap" class="hidden w-24 h-24 rounded-2xl overflow-hidden shrink-0" style="border:1px solid var(--line)">
                            <img id="image-preview" class="w-full h-full object-cover" src="">
                        </div>
                        <div class="flex-1">
                            <input type="file" id="image-file-input" accept="image/jpeg,image/png,image/webp" onchange="handleImageSelect(event)" class="hidden">
                            <button type="button" onclick="document.getElementById('image-file-input').click()" class="btn-secondary text-sm">選擇圖片</button>
                            <button type="button" id="remove-image-btn" onclick="removeSelectedImage()" class="hidden text-sm ml-2" style="color:#C4453F">移除圖片</button>
                            <p class="text-xs mt-2" style="color:#B3A492">支援 jpg / png / webp，檔案大小上限 5MB</p>
                        </div>
                    </div>
                </div>
                <input id="youtube-url" class="form-input mb-6" placeholder="🎬 YouTube 影片連結（選填，例如 https://youtu.be/xxxx）">
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-3">
                        <label class="font-semibold">食材</label>
                        <button type="button" onclick="addIngredientField()" class="text-sm font-medium" style="color:var(--jam)"><i class="fas fa-plus mr-1"></i>新增</button>
                    </div>
                    <p class="text-xs mb-3" style="color:#B3A492">💡 在「分類」欄位輸入相同名稱（例如 A 餅皮 / B 內餡），即可將食材自動分組顯示</p>
                    <div id="ingredients-container" class="space-y-2.5"></div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="font-semibold">作法</label>
                        <button type="button" onclick="addStepField()" class="text-sm font-medium" style="color:var(--jam)"><i class="fas fa-plus mr-1"></i>新增</button>
                    </div>
                    <p class="text-xs mb-3" style="color:#B3A492">💡 影片時間點（mm:ss）點擊後可跳到該片段；預估分鐘可在食譜頁啟動該步驟的計時器</p>
                    <div id="steps-container" class="space-y-2.5"></div>
                </div>
            </div>
            <div class="flex gap-3 px-6 sm:px-8 py-4 border-t shrink-0" style="border-color:var(--line)">
                <button onclick="saveRecipe()" class="btn-primary flex-1">💾 儲存</button>
                <button onclick="closeAddModal()" class="btn-secondary flex-1">取消</button>
            </div>
        </div>
    </div>

    <!-- 購物清單 Modal -->
    <div id="shopping-modal" class="hidden fixed inset-0 modal-backdrop flex items-end md:items-center justify-center z-50">
        <div class="bg-white w-full md:max-w-2xl max-h-[85vh] rounded-t-[2rem] md:rounded-[2rem] overflow-y-auto sheet-panel" id="shopping-modal-content"></div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyB2srYJRT8FqovYt_vCJh35h69H0W7cBLU",
          authDomain: "recipe-synchronization.firebaseapp.com",
          projectId: "recipe-synchronization",
          storageBucket: "recipe-synchronization.firebasestorage.app",
          messagingSenderId: "559668909743",
          appId: "1:559668909743:web:63dc34572b98839479265a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

        // Cloudinary 圖片上傳設定
        const CLOUDINARY_CLOUD_NAME = 'bumzwp9g';
        const CLOUDINARY_UPLOAD_PRESET = 'barking';
        const CLOUDINARY_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;
        const MAX_IMAGE_SIZE = 5 * 1024 * 1024; // 5MB
        const ALLOWED_IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/webp'];

        let selectedImageFile = null; // 使用者本次選擇要上傳的新圖片
        let currentImageUrl = '';     // 目前食譜的圖片網址(編輯時保留舊圖用)

        let currentUser = null;
        let allRecipes = [];
        let selectedCategory = '全部';
        let showFavoritesOnly = false;
        let showMyRecipesOnly = false;
        let userFavorites = new Set();
        let stepTimers = {};

        const ADMIN_EMAIL = 'wallcemax@gmail.com';
        const CATEGORY_LIST = ['全部', '蛋糕', '麵包', '餅乾', '塔派', '慕斯', '其他'];
        const CATEGORY_ICONS = { '蛋糕': '🎂', '麵包': '🍞', '餅乾': '🍪', '塔派': '🥧', '慕斯': '🍮', '其他': '🍽️' };

        function canEditRecipe(recipe) {
            if (!currentUser) return false;
            if (currentUser.email === ADMIN_EMAIL) return true;
            return currentUser.uid === recipe.authorId;
        }

        function isMobileDevice() {
            return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        }

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            if (isMobileDevice()) {
                // 手機瀏覽器的彈出視窗支援度不一，改用整頁導轉方式登入，減少卡在中間狀態的機會
                auth.signInWithRedirect(provider).catch(err => {
                    console.warn('登入導轉發生錯誤', err);
                    alert('登入時發生問題，請重新整理頁面後再試一次');
                });
            } else {
                auth.signInWithPopup(provider).catch(err => {
                    if (err.code === 'auth/popup-blocked' || err.code === 'auth/cancelled-popup-request') {
                        auth.signInWithRedirect(provider);
                    } else {
                        console.warn('登入發生錯誤', err);
                    }
                });
            }
        }

        // 處理登入導轉流程回來後的結果；如果使用者在流程中按了上一頁導致狀態遺失，
        // 這裡會安靜地攔截錯誤，不會讓整個頁面卡住
        auth.getRedirectResult().catch(err => {
            console.warn('登入流程被中斷：', err.code, err.message);
        });

        // 從瀏覽器上一頁 / 下一頁快取（bfcache）恢復頁面時，重新整理避免畫面卡在中間狀態
        window.addEventListener('pageshow', event => {
            if (event.persisted) {
                location.reload();
            }
        });

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            const info = document.getElementById('user-info');
            if (user) {
                const avatar = user.photoURL
                    ? `<img src="${user.photoURL}" class="w-9 h-9 rounded-full border" style="border-color:var(--line)">`
                    : `<div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-semibold" style="background:var(--honey)">${(user.displayName||'?').charAt(0)}</div>`;
                info.innerHTML = `${avatar}<span class="hidden sm:inline text-sm font-medium truncate max-w-[8rem]">${user.displayName}</span><button onclick="logout()" class="text-xs sm:text-sm font-medium" style="color:var(--jam)">登出</button>`;
                loadRecipes();
                loadFavorites();
            } else {
                info.innerHTML = `<button onclick="googleLogin()" class="btn-secondary text-sm flex items-center gap-2"><i class="fab fa-google"></i> 登入</button>`;
                userFavorites = new Set();
                showFavoritesOnly = false;
                showMyRecipesOnly = false;
                document.getElementById('chip-fav')?.classList.remove('active');
                document.getElementById('chip-mine')?.classList.remove('active');
                filterRecipes();
            }
        });

        function initCategoryChips() {
            const row = document.getElementById('category-chips');
            row.innerHTML = CATEGORY_LIST.map(cat => {
                const icon = CATEGORY_ICONS[cat] || '🍽️';
                const label = cat === '全部' ? '全部' : `${icon} ${cat}`;
                return `<button class="chip ${cat === selectedCategory ? 'active' : ''}" id="chip-${cat}" onclick="filterByCategory('${cat}')">${label}</button>`;
            }).join('');
        }
        initCategoryChips();

        function filterByCategory(cat) {
            selectedCategory = cat;
            document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('active'));
            const el = document.getElementById(`chip-${cat}`);
            if (el) el.classList.add('active');
            filterRecipes();
        }

        function toggleFavoritesOnly() {
            if (!currentUser) { alert('請先登入才能查看我的最愛'); return; }
            showFavoritesOnly = !showFavoritesOnly;
            document.getElementById('chip-fav').classList.toggle('active', showFavoritesOnly);
            filterRecipes();
        }

        function toggleMyRecipesOnly() {
            if (!currentUser) { alert('請先登入才能查看我的食譜'); return; }
            showMyRecipesOnly = !showMyRecipesOnly;
            document.getElementById('chip-mine').classList.toggle('active', showMyRecipesOnly);
            filterRecipes();
        }

        function loadFavorites() {
            if (!currentUser) return;
            db.collection('favorites').where('userId', '==', currentUser.uid).onSnapshot(snap => {
                userFavorites = new Set(snap.docs.map(d => d.data().recipeId));
                filterRecipes();
            }, err => console.warn('讀取我的最愛失敗', err));
        }

        function toggleFavorite(recipeId, event) {
            if (event) event.stopPropagation();
            if (!currentUser) { alert('請先登入才能收藏食譜'); return; }
            const favId = `${currentUser.uid}_${recipeId}`;
            const ref = db.collection('favorites').doc(favId);
            if (userFavorites.has(recipeId)) {
                ref.delete().catch(err => alert('取消收藏失敗：' + err.message));
            } else {
                ref.set({
                    userId: currentUser.uid,
                    recipeId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(err => alert('收藏失敗：' + err.message));
            }
        }

        function loadRecipes() {
            db.collection("recipes").orderBy("createdAt", "desc").onSnapshot(snap => {
                allRecipes = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                filterRecipes();
            });
        }

        function renderRecipes(recipes) {
            const grid = document.getElementById('recipes-grid');
            grid.innerHTML = '';
            if (recipes.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20" style="color:#B3A492">
                    <div class="text-5xl mb-3">🍞</div>
                    <p>找不到符合的食譜，換個關鍵字或分類看看</p>
                </div>`;
                return;
            }
            recipes.forEach(r => {
                const div = document.createElement('div');
                div.className = "recipe-card p-6";
                div.tabIndex = 0;
                const icon = CATEGORY_ICONS[r.category] || '🍽️';
                const isFav = userFavorites.has(r.id);
                div.innerHTML = `
                    <button onclick="toggleFavorite('${r.id}', event)" class="fav-btn absolute top-4 right-4 z-10" aria-label="收藏">
                        <i class="${isFav ? 'fas' : 'far'} fa-heart" style="color:var(--jam)"></i>
                    </button>
                    ${r.imageUrl ? `<img src="${r.imageUrl}" class="w-full h-36 object-cover rounded-2xl mb-3" loading="lazy">` : ''}
                    <div class="flex justify-between items-start mb-3">
                        <span class="px-3.5 py-1 text-xs font-medium rounded-full" style="background:#F4E4EA; color:var(--jam)">${icon} ${r.category}</span>

                const matchesFav = !showFavoritesOnly || userFavorites.has(r.id);

                return matchesTerm && matchesCategory && matchesFav && matchesMine;
            });
            renderRecipes(filtered);

        function getYoutubeEmbedUrl(url, startSeconds) {
            if (!url) return null;
            let videoId = '';
            const watchMatch = url.match(/[?&]v=([^&]+)/);
            const shortMatch = url.match(/youtu\.be\/([^?&]+)/);
            const embedMatch = url.match(/embed\/([^?&]+)/);
            const shortsMatch = url.match(/shorts\/([^?&]+)/);
            if (watchMatch) videoId = watchMatch[1];
            else if (shortMatch) videoId = shortMatch[1];
            else if (embedMatch) videoId = embedMatch[1];
            else if (shortsMatch) videoId = shortsMatch[1];
            if (!videoId) return null;
            const start = startSeconds ? `?start=${Math.floor(startSeconds)}&autoplay=1` : '';
            return `https://www.youtube.com/embed/${videoId}${start}`;
        }

        // 將 "1:23" 或 "1:02:03" 或純數字秒數 轉換成秒數
        function parseTimestamp(str) {
            if (!str) return null;
            str = str.trim();
            if (!str) return null;
            if (/^\d+$/.test(str)) return parseInt(str, 10);
            const parts = str.split(':').map(p => parseInt(p, 10));
            if (parts.some(isNaN)) return null;
            if (parts.length === 2) return parts[0] * 60 + parts[1];
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            return null;
        }

        // 將秒數轉換成 mm:ss 顯示格式
        function formatTimestamp(seconds) {
            seconds = Math.floor(seconds);
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            const mm = h > 0 ? String(m).padStart(2, '0') : String(m);
            const ss = String(s).padStart(2, '0');
            return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
        }

        // 點擊步驟的時間標記，讓內嵌影片跳到該秒數並播放
        function seekVideo(seconds, youtubeUrl) {
            const iframe = document.getElementById('yt-player');
            if (!iframe) return;
            iframe.src = getYoutubeEmbedUrl(youtubeUrl, seconds);
            iframe.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // ---------- 步驟計時器 ----------
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch(e) {}
        }

        function startStepTimer(spanId, minutes) {
            const span = document.getElementById(spanId);
            const btn = document.getElementById(spanId.replace('step-timer-', 'step-timer-btn-'));
            if (!span || !btn) return;
            if (!stepTimers[spanId]) {
                stepTimers[spanId] = {
                    remaining: minutes > 0 ? Math.round(minutes * 60) : 0,
                    mode: minutes > 0 ? 'countdown' : 'stopwatch',
                    elapsed: 0,
                    running: false,
                    intervalId: null
                };
            }
            const t = stepTimers[spanId];
            if (t.running) {
                clearInterval(t.intervalId);
                t.running = false;
                btn.style.background = '#EFEAE0'; btn.style.color = 'var(--espresso-soft)';
                return;
            }
            t.running = true;
            btn.style.background = 'var(--jam)'; btn.style.color = '#fff';
            t.intervalId = setInterval(() => {
                if (t.mode === 'countdown') {
                    t.remaining -= 1;
                    if (t.remaining <= 0) {
                        clearInterval(t.intervalId);
                        t.running = false;
                        span.textContent = '時間到！';
                        btn.style.background = 'var(--sage)'; btn.style.color = '#fff';
                        playBeep();
                        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                        return;
                    }
                    span.textContent = formatTimestamp(t.remaining);
                } else {
                    t.elapsed += 1;
                    span.textContent = formatTimestamp(t.elapsed);
                }
            }, 1000);
        }

        function clearAllStepTimers() {
            Object.values(stepTimers).forEach(t => t.intervalId && clearInterval(t.intervalId));
            stepTimers = {};
        }

        async function saveRecipe() {
            const id = document.getElementById('recipe-id').value;
            const name = document.getElementById('name').value.trim();
            if (!name) return alert("請輸入食譜名稱");

            const ingredients = [], steps = [];
            for (let i = 0; i < 30; i++) {
                const n = document.getElementById(`ing-name-${i}`);
                if (n && n.value.trim()) ingredients.push({
                    group: (document.getElementById(`ing-group-${i}`)?.value || '').trim(),
                    name: n.value.trim(),
                    amount: parseFloat(document.getElementById(`ing-amt-${i}`).value) || 0,
                    unit: document.getElementById(`ing-unit-${i}`).value || ''
                });
            }
            for (let i = 0; i < 30; i++) {
                const s = document.getElementById(`step-${i}`);
                if (s && s.value.trim()) {
                    const tsInput = document.getElementById(`step-ts-${i}`);
                    const durInput = document.getElementById(`step-duration-${i}`);
                    const timestamp = tsInput ? parseTimestamp(tsInput.value) : null;
                    const durationMinutes = (durInput && durInput.value !== '') ? parseFloat(durInput.value) : null;
                    steps.push({ text: s.value.trim(), timestamp: timestamp, durationMinutes: durationMinutes });
                }
            }

            const saveBtn = document.querySelector('#add-modal .btn-primary');
            const originalBtnText = saveBtn.textContent;

            let imageUrl = currentImageUrl; // 若沒有選新圖片，保留原本的（或編輯時移除後的空字串）
            if (selectedImageFile) {
                saveBtn.textContent = '📤 圖片上傳中...';
                saveBtn.disabled = true;
                try {
                    imageUrl = await uploadImageToCloudinary(selectedImageFile);
                } catch (err) {
                    alert('圖片上傳失敗：' + err.message);
                    saveBtn.textContent = originalBtnText;
                    saveBtn.disabled = false;
                    return;
                }
            }

            const data = {
                name,
                category: document.getElementById('category').value,
                servings: parseInt(document.getElementById('servings').value) || 1,
                ingredients,
                steps,
                youtubeUrl: document.getElementById('youtube-url').value.trim(),
                imageUrl: imageUrl || '',
                authorName: currentUser.displayName,
                authorId: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            saveBtn.textContent = '💾 儲存中...';
            saveBtn.disabled = true;

            const finish = () => { saveBtn.textContent = originalBtnText; saveBtn.disabled = false; };

            if (id) {
                db.collection("recipes").doc(id).update(data).then(() => { alert("更新成功！"); closeAddModal(); finish(); }).catch(err => { alert('更新失敗：' + err.message); finish(); });
            } else {
                db.collection("recipes").add(data).then(() => { alert("食譜已上傳！"); closeAddModal(); finish(); }).catch(err => { alert('上傳失敗：' + err.message); finish(); });
            }
        }

        function computeAggregatedIngredients() {
            const map = {};
            shoppingList.forEach(item => {
                const factor = item.servings / (item.baseServings || item.servings || 1);
                (item.ingredients || []).forEach(ing => {
                    const key = `${ing.name}|${ing.unit || ''}`;
                    if (!map[key]) map[key] = { name: ing.name, unit: ing.unit || '', amount: 0 };
                    map[key].amount += (ing.amount || 0) * factor;
                });
            });
            return Object.values(map).sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
        }

            renderShoppingList();
            document.getElementById('shopping-modal').classList.remove('hidden');
        }

        function closeShoppingList() {
            document.getElementById('shopping-modal').classList.add('hidden');
        }

        function renderShoppingList() {
            const aggregated = computeAggregatedIngredients();
            const html = `
                <div class="sticky top-0 z-10 flex justify-between items-center gap-4 px-6 sm:px-8 py-5 border-b bg-white" style="border-color:var(--line)">
                    <h2 class="font-display text-xl sm:text-2xl font-bold">🛒 購物清單</h2>
                    <button onclick="closeShoppingList()" class="text-3xl leading-none" style="color:#B3A492" aria-label="關閉">×</button>
                </div>
                <div class="px-6 sm:px-8 py-6">
                    ${shoppingList.length === 0 ? `
                        <p class="text-center py-10" style="color:#B3A492">購物清單是空的，到食譜詳細頁按「加入購物清單」試試看</p>
                    ` : `
                        <div class="mb-8">
                            <h3 class="font-display font-semibold text-lg mb-3">已加入的食譜</h3>
                            ${shoppingList.map((item, i) => `
                                <div class="flex justify-between items-center px-4 py-3 rounded-2xl mb-2" style="background:var(--cream)">
                                    <span>${item.name}<span class="text-xs ml-2" style="color:var(--espresso-soft)">(${item.servings} 人份)</span></span>
                                    <button onclick="removeFromShoppingList(${i})" class="text-lg" style="color:#C4453F">×</button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mb-6">
                            <h3 class="font-display font-semibold text-lg mb-3">合併採買清單（點一下打勾）</h3>
                            ${aggregated.map(ing => `
                                <div onclick="this.classList.toggle('checked-off')" class="shopping-item flex justify-between px-5 py-3 rounded-2xl mb-2 cursor-pointer" style="background:var(--paper); border:1px solid var(--line)">
                                    <span>${ing.name}</span><span class="font-medium">${ing.amount.toFixed(1)} ${ing.unit}</span>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="clearShoppingList()" class="btn-secondary w-full">清空購物清單</button>
                    `}
                </div>
            `;
            document.getElementById('shopping-modal-content').innerHTML = html;
        }

        updateCartBadge();

        // ---------- PWA：註冊 Service Worker ----------
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').catch(err => {
                    console.warn('Service Worker 註冊失敗', err);
                });
            });
        }
    </script>
</body>
</html>
