<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍰 烘焙食譜共享系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-amber-50 min-h-screen">
    <!-- ... 相同 header ... -->
    <div class="max-w-6xl mx-auto p-4">
        <!-- 搜尋與新增按鈕 -->
        <div class="flex gap-4 mb-6">
            <input id="search-input" onkeyup="filterRecipes()" placeholder="搜尋食譜..." class="flex-1 px-6 py-4 border border-gray-300 rounded-3xl">
            <button onclick="showAddModal()" class="bg-pink-600 text-white px-8 py-4 rounded-3xl flex items-center gap-2">
                <i class="fas fa-plus"></i> 新增食譜
            </button>
        </div>
        <div id="recipes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- 詳細 Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-auto" id="modal-content"></div>
    </div>

    <!-- 新增/編輯 Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[95vh] overflow-auto">
            <div class="p-8">
                <h2 class="text-2xl font-bold mb-6" id="modal-title">新增食譜</h2>
                <input id="recipe-id" type="hidden">
                <input id="name" placeholder="食譜名稱" class="w-full px-5 py-4 border rounded-2xl mb-4">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <select id="category" class="px-5 py-4 border rounded-2xl"></select>
                    <input id="servings" type="number" value="8" class="px-5 py-4 border rounded-2xl">
                </div>
                
                <!-- 圖片上傳 -->
                <div class="mb-6">
                    <label class="block mb-2 font-medium">食譜照片</label>
                    <input type="file" id="image-upload" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-medium file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100">
                    <img id="image-preview" class="mt-4 max-h-48 rounded-2xl hidden">
                </div>

                <!-- 食材與步驟 -->
                <div class="mb-6">
                    <div class="flex justify-between mb-3"><label class="font-medium">食材</label><button onclick="addIngredientField()" class="text-pink-600">+ 新增</button></div>
                    <div id="ingredients-container" class="space-y-3"></div>
                </div>
                <div>
                    <div class="flex justify-between mb-3"><label class="font-medium">作法</label><button onclick="addStepField()" class="text-pink-600">+ 新增</button></div>
                    <div id="steps-container" class="space-y-3"></div>
                </div>

                <div class="flex gap-4 mt-10">
                    <button onclick="saveRecipe()" class="flex-1 bg-pink-600 text-white py-4 rounded-3xl">💾 儲存食譜</button>
                    <button onclick="closeAddModal()" class="flex-1 bg-gray-200 py-4 rounded-3xl">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase 初始化 (你的 config)
        const firebaseConfig = { /* 你的 config */ 
          apiKey: "AIzaSyB2srYJRT8FqovYt_vCJh35h69H0W7cBLU",
          authDomain: "recipe-synchronization.firebaseapp.com",
          projectId: "recipe-synchronization",
          storageBucket: "recipe-synchronization.firebasestorage.app",
          messagingSenderId: "559668909743",
          appId: "1:559668909743:web:63dc34572b98839479265a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ... (其餘邏輯與之前版本相同，包含 loadRecipes, showDetail, saveRecipe 等)

        // 在 saveRecipe 中加入圖片上傳邏輯
        async function saveRecipe() {
            // ... 收集資料 ...
            let imageUrl = '';

            const fileInput = document.getElementById('image-upload');
            if (fileInput.files[0]) {
                const file = fileInput.files[0];
                const storageRef = storage.ref('recipe-images/' + Date.now() + '-' + file.name);
                await storageRef.put(file);
                imageUrl = await storageRef.getDownloadURL();
            }

            const data = {
                name, category, servings, ingredients, steps,
                imageUrl,
                authorName: currentUser.displayName,
                authorId: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            // ... 儲存到 Firestore ...
        }
    </script>
</body>
</html>
