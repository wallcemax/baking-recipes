<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍰 烘焙食譜共享系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-amber-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-4">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-pink-500 rounded-2xl flex items-center justify-center text-3xl">🍰</div>
                <div>
                    <h1 class="text-3xl font-bold">烘焙食譜</h1>
                    <p class="text-pink-600 text-sm">共享食譜系統</p>
                </div>
            </div>
            <div id="user-info"></div>
        </header>

        <div id="main-app">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold">公開食譜</h2>
                <button onclick="showAddModal()" class="bg-pink-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2">
                    <i class="fas fa-plus"></i> 新增食譜
                </button>
            </div>
            <div id="recipes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- 新增/編輯食譜 Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 overflow-auto">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[95vh]">
            <div class="p-8">
                <h2 class="text-2xl font-bold mb-6" id="modal-title">新增食譜</h2>
                
                <input id="recipe-id" type="hidden">
                <input id="name" placeholder="食譜名稱" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4 text-lg">

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <select id="category" class="px-5 py-4 border border-gray-300 rounded-2xl">
                        <option value="蛋糕">蛋糕</option>
                        <option value="麵包">麵包</option>
                        <option value="餅乾">餅乾</option>
                        <option value="塔派">塔派</option>
                        <option value="慕斯">慕斯</option>
                        <option value="其他">其他</option>
                    </select>
                    <input id="servings" type="number" value="8" placeholder="份數" class="px-5 py-4 border border-gray-300 rounded-2xl">
                </div>

                <div class="mb-6">
                    <div class="flex justify-between mb-3">
                        <label class="font-medium">食材</label>
                        <button onclick="addIngredientField()" class="text-pink-600 text-sm">+ 新增食材</button>
                    </div>
                    <div id="ingredients-container" class="space-y-3"></div>
                </div>

                <div class="mb-8">
                    <div class="flex justify-between mb-3">
                        <label class="font-medium">作法步驟</label>
                        <button onclick="addStepField()" class="text-pink-600 text-sm">+ 新增步驟</button>
                    </div>
                    <div id="steps-container" class="space-y-3"></div>
                </div>

                <div class="flex gap-4">
                    <button onclick="saveRecipe()" class="flex-1 bg-pink-600 text-white py-4 rounded-3xl font-medium">💾 儲存食譜</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 py-4 rounded-3xl">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyB2srYJRT8FqovYt_vCJh35h69H0W7cBLU",
          authDomain: "recipe-synchronization.firebaseapp.com",
          projectId: "recipe-synchronization",
          storageBucket: "recipe-synchronization.firebasestorage.app",
          messagingSenderId: "559668909743",
          appId: "1:559668909743:web:63dc34572b98839479265a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('user-info').innerHTML = `
                    <span>${user.displayName}</span>
                    <button onclick="logout()" class="ml-4 text-red-500">登出</button>
                `;
                loadRecipes();
            } else {
                document.getElementById('user-info').innerHTML = `<button onclick="googleLogin()" class="px-5 py-2 bg-white rounded-3xl">登入</button>`;
            }
        });

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); }

        function loadRecipes() {
            const grid = document.getElementById('recipes-grid');
            db.collection("recipes").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                grid.innerHTML = '';
                snapshot.forEach(doc => {
                    const r = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-3xl cursor-pointer hover:shadow-xl border";
                    card.innerHTML = `
                        <span class="inline-block px-3 py-1 text-xs bg-pink-100 text-pink-600 rounded-full">${r.category}</span>
                        <h3 class="font-bold text-xl mt-3">${r.name}</h3>
                        <p class="text-sm text-gray-500">${r.servings} 人份</p>
                    `;
                    card.onclick = () => alert(`食譜詳細功能開發中\n\n${r.name}`);
                    grid.appendChild(card);
                });
            });
        }

        function showAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = '新增食譜';
            document.getElementById('recipe-id').value = '';
            document.getElementById('name').value = '';
            document.getElementById('ingredients-container').innerHTML = '';
            document.getElementById('steps-container').innerHTML = '';
            addIngredientField();
            addStepField();
        }

        function closeModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        function addIngredientField() {
            const container = document.getElementById('ingredients-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "grid grid-cols-12 gap-2";
            div.innerHTML = `
                <input type="text" placeholder="食材名稱" class="col-span-5 px-4 py-3 border rounded-xl" id="ing-name-${index}">
                <input type="number" placeholder="用量" value="100" class="col-span-3 px-4 py-3 border rounded-xl" id="ing-amt-${index}">
                <input type="text" placeholder="單位" value="g" class="col-span-3 px-4 py-3 border rounded-xl" id="ing-unit-${index}">
                <button onclick="this.parentElement.remove()" class="col-span-1 text-red-500">×</button>
            `;
            container.appendChild(div);
        }

        function addStepField() {
            const container = document.getElementById('steps-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "flex gap-3";
            div.innerHTML = `
                <span class="pt-3 font-medium text-pink-500">${index + 1}.</span>
                <input type="text" placeholder="步驟內容" class="flex-1 px-5 py-4 border rounded-2xl" id="step-${index}">
            `;
            container.appendChild(div);
        }

        function saveRecipe() {
            const name = document.getElementById('name').value.trim();
            if (!name) return alert("請輸入食譜名稱");

            const ingredients = [];
            const ingContainer = document.getElementById('ingredients-container');
            for (let i = 0; i < ingContainer.children.length; i++) {
                const nameEl = document.getElementById(`ing-name-${i}`);
                if (nameEl && nameEl.value.trim()) {
                    ingredients.push({
                        name: nameEl.value.trim(),
                        amount: parseFloat(document.getElementById(`ing-amt-${i}`).value) || 0,
                        unit: document.getElementById(`ing-unit-${i}`).value || 'g'
                    });
                }
            }

            const steps = [];
            const stepContainer = document.getElementById('steps-container');
            for (let i = 0; i < stepContainer.children.length; i++) {
                const stepEl = document.getElementById(`step-${i}`);
                if (stepEl && stepEl.value.trim()) steps.push(stepEl.value.trim());
            }

            const recipeData = {
                name: name,
                category: document.getElementById('category').value,
                servings: parseInt(document.getElementById('servings').value) || 1,
                ingredients: ingredients,
                steps: steps,
                authorName: currentUser ? currentUser.displayName : '匿名',
                authorId: currentUser ? currentUser.uid : null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection("recipes").add(recipeData)
                .then(() => {
                    alert("✅ 食譜已成功上傳！");
                    closeModal();
                })
                .catch(err => alert("儲存失敗: " + err.message));
        }
    </script>
</body>
</html>
