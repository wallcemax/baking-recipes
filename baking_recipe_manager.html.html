<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍰 烘焙食譜共享系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-amber-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-4">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-pink-500 rounded-2xl flex items-center justify-center text-3xl">🍰</div>
                <div>
                    <h1 class="text-3xl font-bold">烘焙食譜</h1>
                    <p class="text-pink-600 text-sm">共享食譜系統</p>
                </div>
            </div>
            <div id="user-info" class="flex items-center gap-4"></div>
        </header>

        <div id="login-screen" class="text-center py-20 hidden">
            <button onclick="googleLogin()" class="bg-white px-8 py-4 rounded-3xl text-lg shadow-md flex items-center gap-3 mx-auto">
                <i class="fab fa-google"></i> 使用 Google 登入
            </button>
        </div>

        <div id="main-app">
            <div class="flex justify-between mb-6">
                <h2 class="text-3xl font-bold">公開食譜</h2>
                <button onclick="showAddModal()" class="bg-pink-600 text-white px-6 py-3 rounded-3xl flex items-center gap-2 hover:bg-pink-700">
                    <i class="fas fa-plus"></i> 新增食譜
                </button>
            </div>

            <div id="recipes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-auto">
            <div class="p-8">
                <h2 class="text-2xl font-bold mb-6" id="modal-title">新增食譜</h2>
                <input id="recipe-id" type="hidden">
                <!-- Form fields -->
                <div class="space-y-6">
                    <input id="name" placeholder="食譜名稱" class="w-full px-5 py-4 border rounded-2xl text-lg">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="category" class="px-5 py-4 border rounded-2xl">
                            <option value="蛋糕">蛋糕</option>
                            <option value="麵包">麵包</option>
                            <option value="餅乾">餅乾</option>
                            <option value="其他">其他</option>
                        </select>
                        <input id="servings" type="number" value="8" class="px-5 py-4 border rounded-2xl">
                    </div>
                    <button onclick="addIngredientField()" class="text-pink-600">+ 新增食材</button>
                    <div id="ingredients-container" class="space-y-3"></div>
                    <button onclick="addStepField()" class="text-pink-600">+ 新增步驟</button>
                    <div id="steps-container" class="space-y-3"></div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button onclick="saveRecipe()" class="flex-1 bg-pink-600 text-white py-4 rounded-3xl">儲存食譜</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 py-4 rounded-3xl">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* 你的 config */ 
          apiKey: "AIzaSyB2srYJRT8FqovYt_vCJh35h69H0W7cBLU",
          authDomain: "recipe-synchronization.firebaseapp.com",
          projectId: "recipe-synchronization",
          storageBucket: "recipe-synchronization.firebasestorage.app",
          messagingSenderId: "559668909743",
          appId: "1:559668909743:web:63dc34572b98839479265a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('user-info').innerHTML = `${user.displayName} <button onclick="logout()" class="text-red-500 ml-4">登出</button>`;
                loadRecipes();
            } else {
                document.getElementById('user-info').innerHTML = `<button onclick="googleLogin()" class="bg-white px-5 py-2 rounded-3xl">登入</button>`;
            }
        });

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); }

        function loadRecipes() {
            const grid = document.getElementById('recipes-grid');
            db.collection("recipes").orderBy("createdAt", "desc").onSnapshot(snap => {
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const r = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-3xl cursor-pointer hover:shadow-xl";
                    card.innerHTML = `<h3 class="font-bold">${r.name}</h3><p>${r.category} • ${r.servings}人份</p>`;
                    card.onclick = () => alert('詳細功能開發中...');
                    grid.appendChild(card);
                });
            });
        }

        function showAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        function saveRecipe() {
            alert("食譜已儲存到 Firebase！（完整版開發中）");
            closeModal();
        }

        // Placeholder fields
        function addIngredientField() { alert("食材欄位功能開發中"); }
        function addStepField() { alert("步驟欄位功能開發中"); }
    </script>
</body>
</html>
