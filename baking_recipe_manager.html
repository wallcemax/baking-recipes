<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍰 烘焙食譜共享系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 to-amber-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-4">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-pink-500 rounded-2xl flex items-center justify-center text-3xl">🍰</div>
                <div>
                    <h1 class="text-3xl font-bold">烘焙食譜</h1>
                    <p class="text-pink-600 text-sm">共享食譜系統</p>
                </div>
            </div>
            <div id="user-info" class="flex items-center gap-4"></div>
        </header>

        <div class="flex gap-4 mb-6">
            <input id="search-input" onkeyup="filterRecipes()" placeholder="搜尋食譜名稱..." class="flex-1 px-6 py-4 border border-gray-300 rounded-3xl focus:outline-none">
            <button onclick="showAddModal()" class="bg-pink-600 text-white px-8 py-4 rounded-3xl flex items-center gap-2 whitespace-nowrap">
                <i class="fas fa-plus"></i> 新增食譜
            </button>
        </div>

        <div id="recipes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- 食譜詳細 Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-auto" id="modal-content"></div>
    </div>

    <!-- 新增/編輯 Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[95vh] overflow-auto">
            <div class="p-8">
                <h2 class="text-2xl font-bold mb-6" id="modal-title">新增食譜</h2>
                <input id="recipe-id" type="hidden">
                <input id="name" class="w-full px-5 py-4 border rounded-2xl mb-4 text-lg" placeholder="食譜名稱">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <select id="category" class="px-5 py-4 border rounded-2xl">
                        <option value="蛋糕">蛋糕</option><option value="麵包">麵包</option><option value="餅乾">餅乾</option>
                        <option value="塔派">塔派</option><option value="慕斯">慕斯</option><option value="其他">其他</option>
                    </select>
                    <input id="servings" type="number" value="8" class="px-5 py-4 border rounded-2xl">
                </div>
                <input id="youtube-url" class="w-full px-5 py-4 border rounded-2xl mb-6" placeholder="🎬 YouTube 影片連結（選填，例如 https://youtu.be/xxxx）">
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-3">
                        <label class="font-medium">食材</label>
                        <button type="button" onclick="addIngredientField()" class="text-pink-600">+ 新增</button>
                    </div>
                    <p class="text-xs text-gray-400 mb-3">💡 在「分類」欄位輸入相同名稱（例如 A 餅皮 / B 內餡），即可將食材自動分組顯示</p>
                    <div id="ingredients-container" class="space-y-3"></div>
                </div>
                <div>
                    <div class="flex justify-between mb-3"><label class="font-medium">作法</label><button onclick="addStepField()" class="text-pink-600">+ 新增</button></div>
                    <p class="text-xs text-gray-400 mb-3">💡 右側可填入該步驟對應的影片時間點（mm:ss），例如 1:23，點擊後可在食譜頁快速跳到該片段</p>
                    <div id="steps-container" class="space-y-3"></div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button onclick="saveRecipe()" class="flex-1 bg-pink-600 text-white py-4 rounded-3xl">💾 儲存</button>
                    <button onclick="closeAddModal()" class="flex-1 bg-gray-200 py-4 rounded-3xl">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyB2srYJRT8FqovYt_vCJh35h69H0W7cBLU",
          authDomain: "recipe-synchronization.firebaseapp.com",
          projectId: "recipe-synchronization",
          storageBucket: "recipe-synchronization.firebasestorage.app",
          messagingSenderId: "559668909743",
          appId: "1:559668909743:web:63dc34572b98839479265a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allRecipes = [];

        auth.onAuthStateChanged(user => {
            currentUser = user;
            document.getElementById('user-info').innerHTML = user ? `${user.displayName} <button onclick="logout()" class="ml-4 text-red-500">登出</button>` : `<button onclick="googleLogin()" class="bg-white px-5 py-2 rounded-3xl">登入</button>`;
            if (user) loadRecipes();
        });

        function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); }

        function loadRecipes() {
            db.collection("recipes").orderBy("createdAt", "desc").onSnapshot(snap => {
                allRecipes = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderRecipes(allRecipes);
            });
        }

        function renderRecipes(recipes) {
            const grid = document.getElementById('recipes-grid');
            grid.innerHTML = '';
            recipes.forEach(r => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl p-6 cursor-pointer hover:shadow-xl";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="px-4 py-1 text-xs bg-pink-100 text-pink-600 rounded-full">${r.category}</span>
                        ${r.youtubeUrl ? '<i class="fab fa-youtube text-red-500 text-lg"></i>' : ''}
                    </div>
                    <h3 class="font-bold text-xl mt-3">${r.name}</h3>
                    <p class="text-sm text-gray-500">${r.servings} 人份 • ${r.authorName||''}</p>
                `;
                div.onclick = () => showDetail(r);
                grid.appendChild(div);
            });
        }

        function filterRecipes() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allRecipes.filter(r => r.name.toLowerCase().includes(term));
            renderRecipes(filtered);
        }

        function getYoutubeEmbedUrl(url, startSeconds) {
            if (!url) return null;
            let videoId = '';
            const watchMatch = url.match(/[?&]v=([^&]+)/);
            const shortMatch = url.match(/youtu\.be\/([^?&]+)/);
            const embedMatch = url.match(/embed\/([^?&]+)/);
            const shortsMatch = url.match(/shorts\/([^?&]+)/);
            if (watchMatch) videoId = watchMatch[1];
            else if (shortMatch) videoId = shortMatch[1];
            else if (embedMatch) videoId = embedMatch[1];
            else if (shortsMatch) videoId = shortsMatch[1];
            if (!videoId) return null;
            const start = startSeconds ? `?start=${Math.floor(startSeconds)}&autoplay=1` : '';
            return `https://www.youtube.com/embed/${videoId}${start}`;
        }

        // 將 "1:23" 或 "1:02:03" 或純數字秒數 轉換成秒數
        function parseTimestamp(str) {
            if (!str) return null;
            str = str.trim();
            if (!str) return null;
            if (/^\d+$/.test(str)) return parseInt(str, 10);
            const parts = str.split(':').map(p => parseInt(p, 10));
            if (parts.some(isNaN)) return null;
            if (parts.length === 2) return parts[0] * 60 + parts[1];
            if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
            return null;
        }

        // 將秒數轉換成 mm:ss 顯示格式
        function formatTimestamp(seconds) {
            seconds = Math.floor(seconds);
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            const mm = h > 0 ? String(m).padStart(2, '0') : String(m);
            const ss = String(s).padStart(2, '0');
            return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
        }

        // 點擊步驟的時間標記，讓內嵌影片跳到該秒數並播放
        function seekVideo(seconds, youtubeUrl) {
            const iframe = document.getElementById('yt-player');
            if (!iframe) return;
            iframe.src = getYoutubeEmbedUrl(youtubeUrl, seconds);
            iframe.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showDetail(recipe) {
            const html = `
                <div class="p-8">
                    <div class="flex justify-between mb-6">
                        <div>
                            <span class="px-4 py-1 text-xs bg-pink-100 text-pink-600 rounded-full">${recipe.category}</span>
                            <h2 class="text-3xl font-bold mt-3">${recipe.name}</h2>
                        </div>
                        <button onclick="closeDetail()" class="text-4xl text-gray-400">×</button>
                    </div>
                    ${recipe.youtubeUrl && getYoutubeEmbedUrl(recipe.youtubeUrl) ? `
                    <div class="mb-8 aspect-video rounded-2xl overflow-hidden bg-black">
                        <iframe id="yt-player" class="w-full h-full" src="${getYoutubeEmbedUrl(recipe.youtubeUrl)}" title="YouTube video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>` : ''}
                    <div class="flex gap-3 mb-8">
                        <input id="scale-servings" value="${recipe.servings}" type="number" class="flex-1 px-6 py-4 border rounded-3xl">
                        <button onclick="scaleRecipe(${JSON.stringify(recipe).replace(/"/g, '&quot;')})" class="bg-pink-500 text-white px-8 rounded-3xl">換算</button>
                    </div>
                    <div class="mb-10">
                        <h3 class="font-semibold mb-4">食材</h3>
                        <div id="detail-ingredients"></div>
                    </div>
                    <div>
                        <h3 class="font-semibold mb-4">作法</h3>
                        ${recipe.steps.map((s,i) => {
                            const text = typeof s === 'string' ? s : (s.text || '');
                            const ts = typeof s === 'string' ? null : (s.timestamp ?? null);
                            const badge = (ts !== null && recipe.youtubeUrl) ? `<button onclick="seekVideo(${ts}, ${JSON.stringify(recipe.youtubeUrl).replace(/"/g, '&quot;')})" class="inline-flex items-center gap-1 mt-2 text-xs bg-pink-100 text-pink-600 px-3 py-1 rounded-full hover:bg-pink-200"><i class="fas fa-play"></i> ${formatTimestamp(ts)}</button>` : '';
                            return `<div class="flex gap-4 mb-5"><span class="font-medium text-pink-500">${i+1}.</span><div class="flex-1"><p>${text}</p>${badge}</div></div>`;
                        }).join('')}
                    </div>
                    <div class="flex gap-4 mt-12">
                        <button onclick="editRecipe(${JSON.stringify(recipe).replace(/"/g, '&quot;')})" class="flex-1 bg-amber-500 text-white py-4 rounded-3xl">編輯</button>
                        <button onclick="deleteRecipe('${recipe.id}')" class="flex-1 bg-red-500 text-white py-4 rounded-3xl">刪除</button>
                    </div>
                </div>
            `;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('detail-modal').classList.remove('hidden');
            scaleRecipe(recipe);
        }

        function scaleRecipe(recipe) {
            const newServings = parseInt(document.getElementById('scale-servings').value) || recipe.servings;
            const factor = newServings / recipe.servings;
            let html = '';
            let lastGroup = null;
            let first = true;
            recipe.ingredients.forEach(ing => {
                const group = ing.group || '';
                if (group !== lastGroup) {
                    if (group) {
                        html += `<h4 class="font-semibold text-pink-500 ${first ? '' : 'mt-5'} mb-2">${group}</h4>`;
                    }
                    lastGroup = group;
                }
                first = false;
                html += `<div class="flex justify-between bg-gray-50 px-5 py-3 rounded-2xl mb-2"><span>${ing.name}</span><span class="font-medium">${(ing.amount * factor).toFixed(1)} ${ing.unit}</span></div>`;
            });
            document.getElementById('detail-ingredients').innerHTML = html;
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        function editRecipe(recipe) {
            closeDetail();
            showAddModal();
            document.getElementById('modal-title').textContent = '編輯食譜';
            document.getElementById('recipe-id').value = recipe.id;
            document.getElementById('name').value = recipe.name;
            document.getElementById('category').value = recipe.category;
            document.getElementById('servings').value = recipe.servings;
            document.getElementById('youtube-url').value = recipe.youtubeUrl || '';
            document.getElementById('ingredients-container').innerHTML = '';
            recipe.ingredients.forEach(ing => addIngredientField(ing.group || '', ing.name, ing.amount, ing.unit));
            document.getElementById('steps-container').innerHTML = '';
            recipe.steps.forEach(s => {
                if (typeof s === 'string') addStepField(s, '');
                else addStepField(s.text || '', (s.timestamp !== undefined && s.timestamp !== null) ? formatTimestamp(s.timestamp) : '');
            });
        }

        function deleteRecipe(id) {
            if (confirm("確定刪除此食譜？")) {
                db.collection("recipes").doc(id).delete().then(() => {
                    alert("食譜已刪除");
                    closeDetail();
                });
            }
        }

        function showAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = '新增食譜';
            document.getElementById('recipe-id').value = '';
            document.getElementById('name').value = '';
            document.getElementById('youtube-url').value = '';
            document.getElementById('ingredients-container').innerHTML = '';
            document.getElementById('steps-container').innerHTML = '';
            addIngredientField(); addStepField();
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        function addIngredientField(group='', name='', amt=100, unit='g') {
            const container = document.getElementById('ingredients-container');
            const idx = container.children.length;
            const div = document.createElement('div');
            div.className = "grid grid-cols-12 gap-2";
            div.innerHTML = `
                <input value="${group}" id="ing-group-${idx}" placeholder="分類(如 A 餅皮)" class="col-span-3 px-3 py-3 border rounded-xl text-sm text-pink-600 placeholder:text-gray-400">
                <input value="${name}" id="ing-name-${idx}" placeholder="食材" class="col-span-3 px-4 py-3 border rounded-xl">
                <input value="${amt}" type="number" id="ing-amt-${idx}" class="col-span-2 px-4 py-3 border rounded-xl">
                <input value="${unit}" id="ing-unit-${idx}" class="col-span-3 px-4 py-3 border rounded-xl">
                <button onclick="this.parentElement.remove()" class="col-span-1 text-red-500">×</button>
            `;
            container.appendChild(div);
        }

        function addStepField(text='', timestamp='') {
            const container = document.getElementById('steps-container');
            const idx = container.children.length;
            const div = document.createElement('div');
            div.className = "flex gap-3 items-center";
            div.innerHTML = `
                <span class="pt-1 text-pink-500 font-medium">${idx+1}.</span>
                <input value="${text}" id="step-${idx}" placeholder="說明這個步驟..." class="flex-1 px-5 py-4 border rounded-2xl">
                <input value="${timestamp}" id="step-ts-${idx}" placeholder="00:00" title="影片時間點 (mm:ss)" class="w-24 px-3 py-4 border rounded-2xl text-sm text-center">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 px-1">×</button>
            `;
            container.appendChild(div);
        }

        function saveRecipe() {
            const id = document.getElementById('recipe-id').value;
            const name = document.getElementById('name').value.trim();
            if (!name) return alert("請輸入食譜名稱");

            const ingredients = [], steps = [];
            for (let i = 0; i < 30; i++) {
                const n = document.getElementById(`ing-name-${i}`);
                if (n && n.value.trim()) ingredients.push({
                    group: (document.getElementById(`ing-group-${i}`)?.value || '').trim(),
                    name: n.value.trim(),
                    amount: parseFloat(document.getElementById(`ing-amt-${i}`).value) || 0,
                    unit: document.getElementById(`ing-unit-${i}`).value || ''
                });
            }
            for (let i = 0; i < 30; i++) {
                const s = document.getElementById(`step-${i}`);
                if (s && s.value.trim()) {
                    const tsInput = document.getElementById(`step-ts-${i}`);
                    const timestamp = tsInput ? parseTimestamp(tsInput.value) : null;
                    steps.push({ text: s.value.trim(), timestamp: timestamp });
                }
            }

            const data = {
                name, 
                category: document.getElementById('category').value,
                servings: parseInt(document.getElementById('servings').value) || 1,
                ingredients, 
                steps,
                youtubeUrl: document.getElementById('youtube-url').value.trim(),
                authorName: currentUser.displayName,
                authorId: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (id) {
                db.collection("recipes").doc(id).update(data).then(() => { alert("更新成功！"); closeAddModal(); });
            } else {
                db.collection("recipes").add(data).then(() => { alert("食譜已上傳！"); closeAddModal(); });
            }
        }
    </script>
</body>
</html>
